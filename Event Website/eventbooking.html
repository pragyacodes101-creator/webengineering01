<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Tickets</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
      <div class="navbar">
        <div class="logo">
            <img src="images/logo.png" alt="logo" width="100px">
        </div>
        <div class="navbar2">
            <a class="topbar" href="index.html">Home</a>
            <a class="topbar" href="about.html">About</a>
            <a class="topbar" href="schedule.html">Schedule</a>
            <a class="topbar" href="contactus.html">Contact Us</a>
            <a class="topbar" href="eventbooking.html">Event Booking</a>
        </div>
      </div>
    </header>

    <main>
      <div class="booking-container">
        <h1 class="booking-title">Book Your Tickets</h1>
        
        <form class="booking-form">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" required placeholder="Enter your name">
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" required placeholder="Enter your email">
            </div>

            <div class="form-group">
                <label for="sport">Select Sport Event</label>
                <select id="sport" required>
                    <option value="" disabled selected>Choose a sport...</option>
                    <option value="football">Football</option>
                    <option value="badminton">Badminton</option>
                    <option value="cricket">Cricket</option>
                    <option value="tennis">Tennis</option>
                </select>
            </div>

            <div class="form-group">
                <label for="tickets">Number of Tickets</label>
                <input type="number" id="tickets" min="1" max="10" value="1" required>
            </div>

            <button type="submit" class="submit-btn">Confirm Booking</button>
        </form>
      </div>
    </main>

<footer>
    <div class="footerarea">
        <div class="footer-content">
            <div class="footer-section">
                <h3>Event Website</h3>
                <p>The ultimate arena for multi-sport tournaments and events.</p>
            </div>
            <div class="footer-section">
                <h3>Quick Links</h3>
                <a href="index.html">Home</a> | 
                <a href="about.html">About</a> | 
                <a href="schedule.html">Schedule</a> | 
                <a href="contactus.html">Contact Us</a>
            </div>
            <div class="footer-section">
                <h3>Connect</h3>
                <p>E-mail: sports@gmail.com</p>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; 2026 Sports Event Website. All rights reserved.</p>
        </div>
    </div>
</footer>
</body>
</html>
